services:
  nginx:
    image: nginx:1.27-alpine
    container_name: oddny-nginx
    depends_on:
      - astro
      - directus
    ports:
      - "8083:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  directus:
    image: directus/directus:11
    container_name: oddny-directus
    user: root
    expose:
      - "8055"
    volumes:
      - directus-uploads:/directus/uploads
      - directus-database:/directus/database
      - ./directus/extensions:/directus/extensions
      - ./directus/schema-snapshot.yaml:/directus/schema-snapshot.yaml:ro
    environment:
      KEY: ${DIRECTUS_KEY:-replace-with-random-key}
      SECRET: ${DIRECTUS_SECRET:-replace-with-random-secret}
      DB_CLIENT: sqlite3
      DB_FILENAME: /directus/database/database.sqlite
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-https://oddny.appfront.nl/cms}
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:8055/server/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  astro:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DIRECTUS_URL: http://directus:8055
        PUBLIC_DIRECTUS_URL: /cms
    container_name: oddny-astro
    expose:
      - "4321"
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      DIRECTUS_URL: http://directus:8055
      PUBLIC_DIRECTUS_URL: /cms
    depends_on:
      directus:
        condition: service_healthy
    restart: unless-stopped

volumes:
  directus-uploads:
  directus-database:

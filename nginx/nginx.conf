upstream astro_upstream {
  server astro:4321;
}

upstream directus_upstream {
  server directus:8055;
}

# HTTP server - redirect to HTTPS
server {
  listen 80;
  server_name oddny.appfront.nl;
  return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
  listen 443 ssl http2;
  server_name oddny.appfront.nl;

  # SSL Configuration (will be added by certbot)
  ssl_certificate /etc/letsencrypt/live/oddny.appfront.nl/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/oddny.appfront.nl/privkey.pem;
  
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;

  location = /cms {
    return 301 /cms/;
  }

  # Strip /cms before proxying to Directus
  location /cms/ {
    rewrite ^/cms/(.*)$ /$1 break;
    proxy_pass http://directus_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    client_max_body_size 50m;
  }

  location / {
    proxy_pass http://astro_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}